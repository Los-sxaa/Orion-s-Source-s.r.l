<style>

body {
    margin: 0;
    background-image: url("../img/lovecollection.jpg");
    background-size: cover;
    font-family: "Times New Roman";
    text-align: center;
}

/* TITOLI */
h1 {
    font-size: 60px;
    color: darkred;
    margin-top: 20px;
}

h2 {
    font-size: 28px;
    color: rgb(43, 0, 0);
    font-weight: bold;
    padding: 0 20px;
}

/* GRIGLIA 2x3 */
.gallery {
    display: grid;
    grid-template-columns: repeat(3, 1fr); /* 3 colonne fisse */
    gap: 50px; /* spazio tra le card */
    padding: 50px;
    max-width: 1200px;
    margin: auto;
}

/* CARD PIÙ GRANDE */
.photo {
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(6px);
    border-radius: 18px;
    padding: 15px;

    width: 100%;
    height: 420px; /* più grande */
    
    display: flex;
    flex-direction: column;
    justify-content: space-between;

    transition: 0.3s ease;
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
}

/* HOVER */
.photo:hover {
    transform: translateY(-6px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
}

/* NOME */
.nome {
    font-weight: bold;
    font-size: 18px;
    border-bottom: 1px solid rgba(0,0,0,0.2);
    padding-bottom: 6px;
}

/* IMMAGINI PIÙ GRANDI */
.photo img {
    width: 100%;
    height: 280px; /* più grande */
    object-fit: cover;
    border-radius: 12px;
    transition: 0.3s ease;
}

.photo img:hover {
    transform: scale(1.05);
}

/* PREZZO */
.photo p {
    font-size: 16px;
    border-top: 1px solid rgba(0,0,0,0.2);
    padding-top: 6px;
    margin: 0;
}

/* LINK */
a {
    color: inherit;
    text-decoration: none;
}

</style>
</head>
