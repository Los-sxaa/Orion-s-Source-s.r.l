<!DOCTYPE html>
<html lang="it">
    <head>
        <title>Dettagli Set</title>
        <body>
<style>

body {
    margin: 0;
    padding: 30px;
    background-image: url("../img/bg.png");
    background-repeat: no-repeat;
    background-size: cover;
    font-family: "Times New Roman";
    color: white;
}

/* TITOLO */
h1 {
    margin: 0 0 20px 0;
    font-size: 36px;
    color: rgb(27, 76, 114);
    font-weight: bold;
    text-align: center;
}

/* CONTAINER PRINCIPALE */
.container {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: 80px;
    margin-top: 20px;
}

/* PARTE SINISTRA */
.sinistra {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 360px;
}

.sinistra h1 {
    font-size: 28px;
    margin-bottom: 15px;
    color: rgb(27, 76, 114);
    text-align: center;
}

/* IMMAGINE */
.sinistra img {
    width: 100%;
    height: 460px;
    object-fit: cover;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    transition: 0.3s ease;
}

.sinistra img:hover {
    transform: scale(1.02);
}

/* PARTE DESTRA */
.destra {
    max-width: 600px;
}

/* PREZZO */
.prezzo {
    font-size: 38px;
    font-weight: bold;
    color: rgb(73, 113, 212);
    margin-bottom: 20px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
}

/* BOX DESCRIZIONE */
.box {
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(6px);
    padding: 25px;
    border-radius: 15px;
    margin-bottom: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
}

/* TESTO DESCRIZIONE */
p.descrizione {
    line-height: 1.8;
    font-size: 17px;
    margin: 0;
}

/* BOTTONI */
button {
    padding: 12px 22px;
    margin-right: 10px;
    background-color: rgb(127, 200, 255);
    color: rgb(10, 30, 80);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    font-size: 15px;
    transition: 0.3s ease;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(0,0,0,0.3);
}

</style>
    
    <div class="container">
        <div class="sinistra">
            <h1 id="nome">SET DIVINE</h1>
            <img id="immagine" src="" alt="SET">
        </div>

        <div class="destra">
            <div class="prezzo" id="prezzo">€45.000</div>

            <div class="box">
                <p id="descrizione" class="descrizione"></p>
            </div>

            <button id="acquista">Acquista</button>
            <button id="carrello">Aggiungi al carrello</button>
        </div>

    </div>

        <script>
    const params = new URLSearchParams(window.location.search);
    const nome = params.get("nome") || "SET DIVINE";
    const prezzo = params.get("prezzo") || "30%2E000%2C00";
    const img = params.get("img") || "../img/2diamond.jpg";
    const descrizione = params.get("desc") || `
        <b>Materiale:</b> Diamanti <br>
        <b>Taglia:</b> Taglia Unica <br>
        <b>Rapporto con l'acqua:</b> Resistente <br>
        <b>Consegna:</b> 3-5 giorni <br>
        <b>Descrizione:</b>Il set presenta un anello a goccia, un paio di orecchini, un collier e un bracciale di diamanti.<br>
        <b>Condizioni per reso:</b> 15 giorni dalla consegna`;

    document.getElementById("nome").innerText = nome;
    document.getElementById("prezzo").innerText = "€" + prezzo;
    document.getElementById("immagine").src = img;
    document.getElementById("descrizione").innerHTML = descrizione;
    document.getElementById("acquista").addEventListener("click", () => {
        alert("Hai acquistato " + nome + "!");
    });

    document.getElementById("carrello").addEventListener("click", () => {
        const prezzoNumero = parseFloat(prezzo.replace(/\./g,"").replace(",", "."));
        const prodotto = {
            nome: nome,
            prezzo: prezzoNumero,
            img: img
        };

        let carrello = JSON.parse(localStorage.getItem("carrello")) || [];
        carrello.push(prodotto);

        localStorage.setItem("carrello", JSON.stringify(carrello));
        alert(nome + " è stato aggiunto al carrello!");
    });
    
</script>
        </body>
    </head>
</html>
